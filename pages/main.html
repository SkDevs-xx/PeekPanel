<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>PeekPanel</title>
  <link rel="stylesheet" href="../styles/panel.css">
</head>

<body>
  <!-- タブエリア（上） -->
  <div class="tabs-container">
    <div class="tabs" id="tabs"></div>
    <button class="new-tab-button" id="newTab" title="新しいタブ"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg></button>
  </div>

  <!-- ブラウザコントロール（下） -->
  <div class="browser-controls">
    <div class="nav-buttons">
      <button class="nav-button" id="back" title="戻る"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="10 3 5 8 10 13"/></svg></button>
      <button class="nav-button" id="forward" title="進む"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 3 11 8 6 13"/></svg></button>
      <button class="nav-button" id="reload" title="更新"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2v4h-4"/><path d="M13 6A6 6 0 1 1 9.5 2.5"/></svg></button>
    </div>
    <input type="text" class="url-bar" id="urlBar" placeholder="URLを入力...">
    <div class="bookmark-wrapper">
      <button class="utility-button" id="bookmarkButton" title="ブックマーク"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="8 2 10 6.5 15 7.3 11.5 10.7 12.4 15.6 8 13.1 3.6 15.6 4.5 10.7 1 7.3 6 6.5"/></svg></button>
      <div id="bookmarkDropdown" class="bookmark-dropdown" style="display: none;">
        <div class="bookmark-dropdown-header">
          <span>ブックマーク</span>
          <div class="bookmark-header-actions">
            <button id="addFolderBtn" class="add-bookmark-btn" title="新しいフォルダ"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 4a1 1 0 0 1 1-1h3.6l1.4 2H13a1 1 0 0 1 1 1v6a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1z"/></svg></button>
            <button id="addBookmarkBtn" class="add-bookmark-btn" title="現在のページを追加"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="2" x2="8" y2="14"/><line x1="2" y1="8" x2="14" y2="8"/></svg></button>
          </div>
        </div>
        <div id="bookmarkList" class="bookmark-list"></div>
        <div id="bookmarkEmpty" class="bookmark-empty">ブックマークがありません</div>
      </div>
    </div>
    <button class="utility-button" id="sendToMainBrowser" title="Switch to Main Browser"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7 3H3a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h9a1 1 0 0 0 1-1V9"/><polyline points="10 2 14 2 14 6"/><line x1="14" y1="2" x2="7" y2="9"/></svg></button>
    <button class="utility-button" id="settingsButton" title="設定"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6.6 2h2.8l.4 1.7a5 5 0 0 1 1.2.7l1.6-.6 1.4 2.4-1.2 1.1a5 5 0 0 1 0 1.4l1.2 1.1-1.4 2.4-1.6-.6a5 5 0 0 1-1.2.7L9.4 14H6.6l-.4-1.7a5 5 0 0 1-1.2-.7l-1.6.6-1.4-2.4 1.2-1.1a5 5 0 0 1 0-1.4L2 6.2l1.4-2.4 1.6.6a5 5 0 0 1 1.2-.7z"/><circle cx="8" cy="8" r="2"/></svg></button>
  </div>

  <!-- iframeエリア -->
  <div id="iframeContainer" style="display: flex; flex: 1; position: relative;"></div>

  <!-- フッター（AI選択） -->
  <div class="footer-controls">
    <span class="footer-label">Input AI</span>
    <select id="ai-selector-dropdown" class="ai-dropdown"></select>
  </div>

  <!-- カスタムコンテキストメニュー（テキスト選択時） -->
  <div id="customContextMenu" style="display: none; position: fixed; z-index: 10000;">
    <div
      style="background: var(--bg-secondary); border: 1px solid var(--border-color); border-radius: 6px; box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4); padding: 4px 0; min-width: 200px;">
      <div id="searchGoogleItem" class="context-menu-item"
        style="display: flex; align-items: center; padding: 8px 16px; cursor: pointer; font-size: 13px; color: var(--text-primary); transition: background 0.15s;">
        <span style="margin-right: 8px; display: flex;"><svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="4.5"/><line x1="10.5" y1="10.5" x2="14" y2="14"/></svg></span>
        <span id="searchGoogleText">Googleで検索</span>
      </div>
    </div>
  </div>

  <!-- エラーオーバーレイテンプレート -->
  <template id="errorOverlayTemplate">
    <div class="error-overlay">
      <div class="error-icon"><svg width="32" height="32" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M7.1 2.5a1 1 0 0 1 1.8 0l6 10.5A1 1 0 0 1 14 14.5H2a1 1 0 0 1-.9-1.5z"/><line x1="8" y1="7" x2="8" y2="10"/><line x1="8" y1="12" x2="8.01" y2="12"/></svg></div>
      <div class="error-title">ページの読み込みに失敗しました</div>
      <div class="error-message"></div>
      <div class="error-actions">
        <button class="error-button primary" data-action="retry">再読み込み</button>
        <button class="error-button" data-action="close">閉じる</button>
      </div>
    </div>
  </template>

  <!-- グループ作成モーダル -->
  <div id="createGroupModal" class="group-modal" style="display: none;">
    <div class="group-modal-content">
      <div class="group-modal-header">
        <h2>新しいグループを作成</h2>
        <button class="group-modal-close" id="closeGroupModal">✕</button>
      </div>
      <div class="group-modal-body">
        <div class="group-form-field">
          <label for="groupNameInput">グループ名</label>
          <input type="text" id="groupNameInput" placeholder="グループ名を入力..." maxlength="30">
        </div>
        <div class="group-form-field">
          <label>グループの色</label>
          <div class="group-color-picker" id="groupColorPicker"></div>
        </div>
      </div>
      <div class="group-modal-footer">
        <button class="group-modal-button secondary" id="cancelGroupModal">キャンセル</button>
        <button class="group-modal-button primary" id="confirmGroupModal">作成</button>
      </div>
    </div>
  </div>

  <!-- グループ名変更モーダル -->
  <div id="renameGroupModal" class="group-modal" style="display: none;">
    <div class="group-modal-content">
      <div class="group-modal-header">
        <h2>グループ名を変更</h2>
        <button class="group-modal-close" id="closeRenameModal">✕</button>
      </div>
      <div class="group-modal-body">
        <div class="group-form-field">
          <label for="renameGroupInput">グループ名</label>
          <input type="text" id="renameGroupInput" placeholder="グループ名を入力..." maxlength="30">
        </div>
      </div>
      <div class="group-modal-footer">
        <button class="group-modal-button secondary" id="cancelRenameModal">キャンセル</button>
        <button class="group-modal-button primary" id="confirmRenameModal">変更</button>
      </div>
    </div>
  </div>

  <!-- 削除確認モーダル -->
  <div class="group-modal" id="deleteGroupModal" style="display: none;">
    <div class="group-modal-content">
      <div class="group-modal-header">
        <h2>グループを削除</h2>
        <button class="group-modal-close" id="closeDeleteModal">✕</button>
      </div>
      <div class="group-modal-body">
        <p id="deleteGroupMessage"
          style="color: var(--text-primary); font-size: 14px; line-height: 1.6; margin-bottom: 16px;"></p>
      </div>
      <div class="group-modal-footer">
        <button class="group-modal-button secondary" id="cancelDelete">キャンセル</button>
        <button class="group-modal-button primary" id="confirmDelete" style="background: #dc3545;">削除</button>
      </div>
    </div>
  </div>

  <script type="module" src="../js/browser-core.js"></script>
</body>

</html>
