<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>最近閉じたタブ</title>
  <link rel="stylesheet" href="../styles/common.css">
</head>

<body>
  <div class="header">
    <h1><svg width="20" height="20" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 6px;"><circle cx="8" cy="8" r="6"/><polyline points="8 5 8 8 10.5 8"/></svg>最近閉じたタブ</h1>
    <button id="closeButton" class="button button-normal">閉じる</button>
  </div>

  <div class="setting-section">
    <div id="historyContainer"></div>
  </div>

  <button id="clearButton" class="button button-danger" style="margin-top: 12px;">履歴をクリア</button>
  <div class="status-message" id="statusMessage"></div>

  <!-- 履歴クリア確認モーダル -->
  <div id="clearConfirmModal" class="modal" style="display: none;">
    <div class="modal-content" style="max-width: 400px;">
      <div class="modal-header">
        <h2>履歴をクリア</h2>
        <button class="modal-close" id="clearModalCloseButton">✕</button>
      </div>

      <div class="modal-body">
        <p style="margin: 0; color: var(--text-primary);">すべての履歴を削除してもよろしいですか？</p>
        <p style="margin: 8px 0 0 0; font-size: 12px; color: var(--text-secondary);">この操作は取り消せません。</p>
      </div>

      <div class="modal-footer">
        <button class="button button-normal" id="clearModalCancelButton">キャンセル</button>
        <button class="button button-danger" id="confirmClearButton">クリア</button>
      </div>
    </div>
  </div>

  <script type="module" src="../js/history.js"></script>
</body>

</html>
